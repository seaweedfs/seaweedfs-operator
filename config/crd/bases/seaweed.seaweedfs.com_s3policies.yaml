---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: s3policies.seaweed.seaweedfs.com
spec:
  group: seaweed.seaweedfs.com
  names:
    categories:
    - seaweedfs
    kind: S3Policy
    listKind: S3PolicyList
    plural: s3policies
    shortNames:
    - s3pol
    singular: s3policy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.seaweedRef.name
      name: Cluster
      type: string
    - jsonPath: .status.policyName
      name: Policy
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            properties:
              name:
                maxLength: 128
                minLength: 1
                type: string
                x-kubernetes-validations:
                - message: policy name is immutable once set
                  rule: oldSelf == '' || self == oldSelf
              policyDocument:
                type: string
              reclaimPolicy:
                default: Delete
                enum:
                - Delete
                - Retain
                type: string
              seaweedRef:
                properties:
                  name:
                    minLength: 1
                    type: string
                  namespace:
                    type: string
                required:
                - name
                type: object
              statements:
                items:
                  properties:
                    actions:
                      items:
                        type: string
                      minItems: 1
                      type: array
                      x-kubernetes-list-type: set
                    effect:
                      enum:
                      - Allow
                      - Deny
                      type: string
                    resources:
                      items:
                        type: string
                      minItems: 1
                      type: array
                      x-kubernetes-list-type: set
                    sid:
                      type: string
                  required:
                  - actions
                  - effect
                  - resources
                  type: object
                type: array
                x-kubernetes-list-type: atomic
            required:
            - seaweedRef
            type: object
            x-kubernetes-validations:
            - message: set exactly one of spec.statements or spec.policyDocument
              rule: (has(self.statements) && size(self.statements) > 0) != (has(self.policyDocument)
                && size(self.policyDocument) > 0)
          status:
            properties:
              conditions:
                items:
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                format: int64
                type: integer
              phase:
                enum:
                - Pending
                - Ready
                - Failed
                - Terminating
                type: string
              policyName:
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
