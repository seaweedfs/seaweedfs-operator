apiVersion: seaweed.seaweedfs.com/v1
kind: S3Credentials
metadata:
  name: alice-creds
  namespace: default
spec:
  seaweedRef:
    name: seaweed-sample
  # The S3Identity (by resource name, same namespace) this key pair belongs
  # to. A name with no matching S3Identity is used as the IAM user name
  # directly.
  identityRef:
    name: alice
  # Where to store the key pair. If the Secret is absent or empty the
  # operator generates a fresh access key / secret key and writes it here;
  # if the Secret already holds both fields they are adopted as-is.
  secretRef:
    name: alice-s3-secret
    # accessKeyField: accessKey   # default
    # secretKeyField: secretKey   # default
  # reclaimPolicy: Retain  # default Delete: removing this CR deletes the
  #                        # access key (and any operator-created Secret)
