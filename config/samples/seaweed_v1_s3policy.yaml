apiVersion: seaweed.seaweedfs.com/v1
kind: S3Policy
metadata:
  name: rw-uploads
  namespace: default
spec:
  seaweedRef:
    name: seaweed-sample
  # Structured statements are assembled into an AWS-style policy document.
  # Resources accept bucket-relative shorthand ("my-bucket", "my-bucket/*"),
  # which is expanded to arn:aws:s3:::my-bucket / arn:aws:s3:::my-bucket/*.
  # Actions are S3 actions; "*" is shorthand for "s3:*".
  statements:
    - effect: Allow
      actions:
        - s3:ListBucket
      resources:
        - my-bucket
    - effect: Allow
      actions:
        - s3:GetObject
        - s3:PutObject
        - s3:DeleteObject
      resources:
        - my-bucket/uploads/*
  # Alternatively, supply a raw AWS-style document for full control:
  # policyDocument: |
  #   {"Version":"2012-10-17","Statement":[{"Effect":"Allow","Action":"s3:*","Resource":"arn:aws:s3:::my-bucket/*"}]}
