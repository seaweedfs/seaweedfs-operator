{{- if .Values.webhook.enabled }}
{{- $certManager := default dict .Values.webhook.certManager }}

apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  creationTimestamp: null
  name: {{ include "seaweedfs-operator.validatingWebhookName" . }}
  labels:
    {{- include "seaweedfs-operator.labels" . | nindent 4 }}
  {{- if $certManager.enabled }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "seaweedfs-operator.webhookCertificateName" . }}
  {{- end }}
webhooks:
- clientConfig:
    service:
      name: {{ include "seaweedfs-operator.fullname" . }}-webhook
      namespace: {{ .Release.Namespace }}
      port: 443
      path: {{ include "seaweedfs-operator.validatingWebhookPath" . }}
  name: vseaweed.kb.io
  failurePolicy: Fail
  sideEffects: None
  admissionReviewVersions:
  - v1
  rules:
  - apiGroups:
    - seaweed.seaweedfs.com
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - seaweeds

{{- end }}
